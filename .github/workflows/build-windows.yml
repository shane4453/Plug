name: Build Windows VST3

# main 브랜치에 push할 때, 그리고 수동 실행(workflow_dispatch)으로도 돌아감
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest   # GitHub가 제공하는 x64 Windows 머신

    steps:
      # 1) 소스 체크아웃 (JUCE가 서브모듈이면 같이 받아옴)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) CMake configure — Visual Studio 2022 / x64 타깃
      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      # 3) Release 빌드
      - name: Build
        run: cmake --build build --config Release --parallel

      # 4) 빌드된 .vst3를 결과물(artifact)로 업로드
      #    빌드 후 Actions 실행 페이지에서 zip으로 다운로드 가능
      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: ShaneDist-Windows-VST3
          path: build/**/*.vst3
          if-no-files-found: error
